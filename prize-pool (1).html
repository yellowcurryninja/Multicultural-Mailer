<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Multicultural Mailer – Prize Pool</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:       #07000f;
  --surface:  #110020;
  --card:     #1a0030;
  --border:   rgba(160,80,255,0.22);
  --purple:   #7c2ae8;
  --violet:   #a855f7;
  --lavender: #c084fc;
  --gold:     #f5c842;
  --gold2:    #ffb800;
  --white:    #f3eaff;
  --muted:    #9370b8;
  --radius:   20px;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

html,body{
  min-height:100vh;
  background:var(--bg);
  font-family:'Plus Jakarta Sans',sans-serif;
  color:var(--white);
  overflow-x:hidden;
}

/* ── Background mesh ── */
body::before{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 900px 600px at 50% -10%, rgba(100,20,200,0.28) 0%, transparent 70%),
    radial-gradient(ellipse 500px 400px at 90% 80%,  rgba(80,0,160,0.18)  0%, transparent 70%),
    radial-gradient(ellipse 400px 300px at 0% 60%,   rgba(60,0,120,0.15)  0%, transparent 70%);
  pointer-events:none;z-index:0;
}

/* ── Animated stars ── */
.stars{
  position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;
}
.star{
  position:absolute;border-radius:50%;
  background:rgba(255,255,255,0.9);
  animation:twinkle var(--d,4s) ease-in-out infinite var(--delay,0s);
}
@keyframes twinkle{
  0%,100%{opacity:0.2;transform:scale(1)}
  50%{opacity:1;transform:scale(1.4)}
}

/* ── Page layout ── */
.page{
  position:relative;z-index:1;
  display:flex;flex-direction:column;align-items:center;
  min-height:100vh;
  padding:40px 20px 70px;
}

/* ── Header ── */
.header{
  text-align:center;margin-bottom:44px;
  animation:fadeDown .9s cubic-bezier(.22,1,.36,1) both;
}

.logo-area{
  margin-bottom:18px;
}
.logo-area img{
  height:72px;
  width:auto;
  object-fit:contain;
  filter:drop-shadow(0 0 20px rgba(180,80,255,.4));
}

.event-badge{
  display:inline-block;
  background:linear-gradient(135deg,rgba(124,42,232,.35),rgba(168,85,247,.25));
  border:1px solid rgba(168,85,247,.4);
  border-radius:50px;
  padding:5px 18px;
  font-size:11px;
  letter-spacing:.2em;
  text-transform:uppercase;
  color:var(--lavender);
  margin-bottom:14px;
}

h1{
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(22px,4.5vw,42px);
  font-weight:900;
  line-height:1.15;
  background:linear-gradient(135deg,#d8a8ff 0%,#f5c842 45%,#c084fc 100%);
  background-size:200% auto;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  animation:shimmer 5s linear infinite;
  margin-bottom:0;
}

/* ── Main card ── */
.card{
  width:100%;max-width:620px;
  background:linear-gradient(160deg,rgba(28,0,52,.92) 0%,rgba(16,0,32,.96) 100%);
  border:1px solid var(--border);
  border-radius:28px;
  padding:44px 40px;
  text-align:center;
  box-shadow:
    0 0 0 1px rgba(160,80,255,.08),
    0 0 80px rgba(124,42,232,.18),
    0 30px 80px rgba(0,0,0,.6);
  backdrop-filter:blur(12px);
  animation:fadeUp .9s .15s cubic-bezier(.22,1,.36,1) both;
}

/* ── Participant count ── */
.count-row{
  display:flex;align-items:center;justify-content:center;gap:8px;
  margin-bottom:32px;
}
.count-pill{
  background:rgba(124,42,232,.25);
  border:1px solid rgba(168,85,247,.3);
  border-radius:50px;
  padding:6px 16px;
  font-size:13px;
  color:var(--lavender);
  display:flex;align-items:center;gap:6px;
}
.count-pill .num{
  font-weight:700;color:var(--lavender);font-size:15px;
}
.count-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--violet);
  box-shadow:0 0 8px var(--violet);
  animation:pulse-dot 2s ease-in-out infinite;
}
@keyframes pulse-dot{
  0%,100%{opacity:.5;transform:scale(.9)}
  50%{opacity:1;transform:scale(1.2)}
}

/* ── Drum roller ── */
.drum-outer{
  position:relative;
  background:rgba(7,0,15,.6);
  border:1px solid rgba(160,80,255,.25);
  border-radius:16px;
  height:90px;
  overflow:hidden;
  margin-bottom:28px;
}
.drum-outer::before,.drum-outer::after{
  content:'';position:absolute;left:0;right:0;height:36px;z-index:2;pointer-events:none;
}
.drum-outer::before{top:0;background:linear-gradient(to bottom,rgba(16,0,32,.9),transparent);}
.drum-outer::after{bottom:0;background:linear-gradient(to top,rgba(16,0,32,.9),transparent);}

.focus-line{
  position:absolute;left:0;right:0;top:50%;z-index:3;pointer-events:none;
}
.focus-line::before,.focus-line::after{
  content:'';display:block;
  height:1px;
  background:linear-gradient(to right,transparent,rgba(168,85,247,.7),transparent);
}
.focus-line::before{transform:translateY(-22px);}
.focus-line::after{transform:translateY(21px);}

.drum-track{
  position:absolute;width:100%;
  transition:transform .07s linear;
}
.drum-item{
  height:90px;
  display:flex;align-items:center;justify-content:center;
  font-size:clamp(20px,4vw,30px);
  font-weight:600;
  letter-spacing:.02em;
  color:var(--white);
  padding:0 20px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  transition:color .2s;
}
.drum-item.active{
  color:var(--gold);
  text-shadow:0 0 24px rgba(245,200,66,.5);
}
.drum-idle{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;color:var(--muted);
  font-style:italic;
}

/* ── Winner reveal ── */
.winner-wrap{
  display:none;
  margin-bottom:28px;
  animation:winnerIn .7s cubic-bezier(.34,1.56,.64,1) both;
}
.winner-inner{
  background:linear-gradient(135deg,rgba(245,200,66,.1),rgba(168,85,247,.1));
  border:1px solid rgba(245,200,66,.4);
  border-radius:20px;
  padding:22px 32px;
}
.winner-tag{
  font-size:11px;letter-spacing:.22em;text-transform:uppercase;
  color:var(--gold);opacity:.8;margin-bottom:6px;
}
.winner-name-text{
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(18px,3.5vw,28px);
  color:var(--gold);
  text-shadow:0 0 40px rgba(245,200,66,.6);
  line-height:1.3;
}
.winner-sub{
  font-size:12px;color:rgba(245,200,66,.55);
  margin-top:4px;letter-spacing:.08em;
}

/* ── Buttons ── */
.btn-row{
  display:flex;gap:12px;flex-wrap:wrap;justify-content:center;
}
.btn{
  padding:14px 38px;border-radius:50px;border:none;cursor:pointer;
  font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;
  transition:all .25s;
}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none!important;}

.btn-main{
  background:linear-gradient(135deg,var(--purple),var(--violet));
  color:#fff;
  box-shadow:0 6px 32px rgba(124,42,232,.5);
}
.btn-main:hover:not(:disabled){
  transform:translateY(-2px);
  box-shadow:0 10px 44px rgba(168,85,247,.7);
}
.btn-main:active:not(:disabled){transform:translateY(0);}

.btn-ghost{
  background:transparent;color:var(--muted);
  border:1px solid rgba(168,85,247,.25);
}
.btn-ghost:hover:not(:disabled){
  color:var(--white);
  border-color:var(--violet);
  background:rgba(168,85,247,.1);
}

/* ── Hidden upload ── */
.upload-trigger{
  position:fixed;bottom:24px;right:24px;
  width:44px;height:44px;border-radius:50%;
  background:rgba(28,0,52,.85);
  border:1px solid rgba(168,85,247,.3);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:18px;
  transition:all .25s;
  box-shadow:0 4px 20px rgba(0,0,0,.4);
  z-index:50;
  backdrop-filter:blur(8px);
}
.upload-trigger:hover{
  border-color:var(--violet);
  background:rgba(124,42,232,.3);
  box-shadow:0 4px 24px rgba(124,42,232,.4);
  transform:scale(1.05);
}
.upload-trigger title-tip{display:none;}

/* Upload tooltip */
.upload-trigger::after{
  content:attr(data-tip);
  position:absolute;right:52px;top:50%;transform:translateY(-50%);
  background:rgba(20,0,40,.95);
  border:1px solid rgba(168,85,247,.3);
  border-radius:8px;padding:6px 12px;
  font-size:12px;color:var(--lavender);white-space:nowrap;
  opacity:0;pointer-events:none;
  transition:opacity .2s;
}
.upload-trigger:hover::after{opacity:1;}

/* ── Upload modal ── */
.modal-overlay{
  display:none;
  position:fixed;inset:0;z-index:200;
  background:rgba(7,0,15,.75);backdrop-filter:blur(8px);
  align-items:center;justify-content:center;
}
.modal-overlay.open{display:flex;}
.modal{
  background:linear-gradient(160deg,#1a0030,#110020);
  border:1px solid rgba(168,85,247,.35);
  border-radius:24px;
  padding:36px;width:100%;max-width:440px;
  box-shadow:0 0 60px rgba(124,42,232,.3);
  animation:fadeUp .4s cubic-bezier(.22,1,.36,1) both;
}
.modal h2{
  font-family:'Cinzel Decorative',serif;
  font-size:16px;color:var(--lavender);
  margin-bottom:20px;text-align:center;
}
.drop-zone{
  border:2px dashed rgba(168,85,247,.4);
  border-radius:14px;
  padding:30px 20px;
  text-align:center;
  cursor:pointer;
  transition:all .25s;
  background:rgba(124,42,232,.06);
}
.drop-zone:hover,.drop-zone.drag-over{
  border-color:var(--violet);
  background:rgba(168,85,247,.12);
}
.drop-zone input{display:none;}
.drop-icon{font-size:32px;margin-bottom:8px;}
.drop-zone p{font-size:14px;color:var(--muted);}
.drop-zone strong{color:var(--lavender);}
.file-status{
  margin-top:14px;font-size:13px;
  color:var(--gold);text-align:center;
  min-height:20px;
}
.modal-actions{
  display:flex;gap:10px;margin-top:22px;justify-content:center;
}

/* ── Confetti canvas ── */
#confetti{position:fixed;inset:0;pointer-events:none;z-index:100;}

/* ── Glow pulse on card during draw ── */
.card.drawing{
  box-shadow:
    0 0 0 1px rgba(168,85,247,.2),
    0 0 100px rgba(124,42,232,.35),
    0 30px 80px rgba(0,0,0,.6);
  transition:box-shadow .3s;
}

/* ── Keyframes ── */
@keyframes shimmer{
  0%{background-position:0% center}
  100%{background-position:200% center}
}
@keyframes fadeDown{
  from{opacity:0;transform:translateY(-22px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(26px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes winnerIn{
  from{opacity:0;transform:scale(.75)}
  to{opacity:1;transform:scale(1)}
}

/* ── Footer ── */
.footer{
  margin-top:auto;padding-top:48px;
  font-size:11px;letter-spacing:.12em;text-transform:uppercase;
  color:rgba(147,112,184,.3);
}

@media(max-width:500px){
  .card{padding:32px 22px;}
  h1{font-size:20px;}
  .winner-inner{padding:16px 20px;}
}
</style>
</head>
<body>

<canvas id="confetti"></canvas>
<div class="stars" id="stars"></div>

<div class="page">

  <!-- Header -->
  <header class="header">
    <div class="logo-area">
      <img id="logoImg" src="" alt="Multicultural Mailer"/>
    </div>
    <div class="event-badge">✦ Official Lucky Draw ✦</div>
    <h1>Prize Pool</h1>
  </header>

  <!-- Main card -->
  <div class="card" id="mainCard">

    <!-- Count -->
    <div class="count-row">
      <div class="count-pill">
        <span class="count-dot"></span>
        <span class="num" id="countNum">0</span>
        <span>Participants</span>
      </div>
    </div>

    <!-- Drum -->
    <div class="drum-outer" id="drumOuter">
      <div class="focus-line"></div>
      <div class="drum-track" id="drumTrack">
        <div class="drum-item" id="singleItem">Upload names to begin</div>
      </div>
      <div class="drum-idle" id="drumIdle">Waiting for draw…</div>
    </div>

    <!-- Winner -->
    <div class="winner-wrap" id="winnerWrap">
      <div class="winner-inner">
        <p class="winner-tag">🏆 Lucky Winner</p>
        <p class="winner-name-text" id="winnerNameEl"></p>
        <p class="winner-sub">Congratulations!</p>
      </div>
    </div>

    <!-- Buttons -->
    <div class="btn-row">
      <button class="btn btn-main" id="drawBtn" disabled>Draw Winner</button>
      <button class="btn btn-ghost" id="resetBtn" disabled>Reset</button>
    </div>
  </div>

  <p class="footer">Multicultural Mailer — Prize Pool Draw</p>
</div>

<!-- Upload trigger (subtle gear icon, bottom-right) -->
<div class="upload-trigger" id="uploadTrigger" data-tip="Load names file">⚙</div>

<!-- Upload Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>Load Participants</h2>
    <div class="drop-zone" id="dropZone">
      <input type="file" id="namesInput" accept=".txt,.csv"/>
      <div class="drop-icon">📋</div>
      <p><strong>Drop your names file here</strong></p>
      <p>or click to browse · .txt or .csv</p>
    </div>
    <p class="file-status" id="fileStatus"></p>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="modalClose">Close</button>
    </div>
  </div>
</div>

document.getElementById('logoImg').src = 'data:image/webp;base64,' + LOGO_B64;

// ── Generate stars ──
const starsEl = document.getElementById('stars');
for(let i=0;i<90;i++){
  const s=document.createElement('div');
  s.className='star';
  const size=Math.random()*2.2+.5;
  s.style.cssText=`
    width:${size}px;height:${size}px;
    top:${Math.random()*100}%;left:${Math.random()*100}%;
    --d:${3+Math.random()*5}s;
    --delay:-${Math.random()*6}s;
  `;
  starsEl.appendChild(s);
}

// ── State ──
let names=[];
let rolling=false;
let rollTimer=null;
let currentIdx=0;

// ── Elements ──
const countNum    = document.getElementById('countNum');
const drumOuter   = document.getElementById('drumOuter');
const drumTrack   = document.getElementById('drumTrack');
const singleItem  = document.getElementById('singleItem');
const drumIdle    = document.getElementById('drumIdle');
const drawBtn     = document.getElementById('drawBtn');
const resetBtn    = document.getElementById('resetBtn');
const winnerWrap  = document.getElementById('winnerWrap');
const winnerNameEl= document.getElementById('winnerNameEl');
const mainCard    = document.getElementById('mainCard');

// ── Upload modal ──
const uploadTrigger = document.getElementById('uploadTrigger');
const modalOverlay  = document.getElementById('modalOverlay');
const modalClose    = document.getElementById('modalClose');
const dropZone      = document.getElementById('dropZone');
const namesInput    = document.getElementById('namesInput');
const fileStatus    = document.getElementById('fileStatus');

uploadTrigger.addEventListener('click',()=>modalOverlay.classList.add('open'));
modalClose.addEventListener('click',()=>modalOverlay.classList.remove('open'));
modalOverlay.addEventListener('click',e=>{if(e.target===modalOverlay)modalOverlay.classList.remove('open');});

dropZone.addEventListener('click',()=>namesInput.click());
dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('drag-over');});
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop',e=>{
  e.preventDefault();dropZone.classList.remove('drag-over');
  if(e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]);
});
namesInput.addEventListener('change',e=>{if(e.target.files[0]) processFile(e.target.files[0]);});

function processFile(file){
  const reader=new FileReader();
  reader.onload=ev=>{
    const text=ev.target.result;
    const parsed=text.split(/\r?\n/)
      .map(l=>l.split(',')[0].replace(/^"|"$/g,'').trim())
      .filter(n=>n.length>0);
    if(!parsed.length){fileStatus.textContent='⚠ No names found.';return;}
    names=parsed;
    countNum.textContent=names.length;
    fileStatus.textContent=`✓ ${file.name} — ${names.length} names loaded`;
    setDisplayName(names[0]);
    drumIdle.style.display='none';
    drawBtn.disabled=false;
    resetBtn.disabled=false;
    winnerWrap.style.display='none';
    setTimeout(()=>modalOverlay.classList.remove('open'),900);
  };
  reader.readAsText(file);
}

function setDisplayName(name){
  singleItem.textContent=name;
  singleItem.classList.remove('active');
}

// ── Draw ──
drawBtn.addEventListener('click',()=>{
  if(!names.length||rolling)return;
  doRoll();
});
resetBtn.addEventListener('click',()=>{
  clearTimeout(rollTimer);
  rolling=false;
  winnerWrap.style.display='none';
  singleItem.classList.remove('active');
  mainCard.classList.remove('drawing');
  setDisplayName(names[0]||'');
  drawBtn.disabled=!names.length;
  drawBtn.textContent='Draw Winner';
  stopConfetti();
});

function doRoll(){
  rolling=true;
  drawBtn.disabled=true;
  drawBtn.textContent='Drawing…';
  winnerWrap.style.display='none';
  mainCard.classList.add('drawing');

  const totalDuration=4200;
  const start=Date.now();

  function tick(){
    const elapsed=Date.now()-start;
    const progress=Math.min(elapsed/totalDuration,1);

    if(progress>=1){
      const idx=Math.floor(Math.random()*names.length);
      singleItem.textContent=names[idx];
      singleItem.classList.add('active');
      rolling=false;
      mainCard.classList.remove('drawing');
      drawBtn.textContent='Draw Again';
      drawBtn.disabled=false;
      showWinner(names[idx]);
      return;
    }

    // Ease-out: start fast, slow down
    const eased=Math.pow(progress,3);
    const delay=Math.max(35,35+eased*250);

    currentIdx=(currentIdx+1)%names.length;
    singleItem.textContent=names[currentIdx];

    rollTimer=setTimeout(tick,delay);
  }
  tick();
}

function showWinner(name){
  winnerNameEl.textContent=name;
  winnerWrap.style.display='block';
  launchConfetti();
}

// ── Confetti ──
const canvas=document.getElementById('confetti');
const ctx=canvas.getContext('2d');
let particles=[];
let cRaf=null;
let running=false;

function launchConfetti(){
  canvas.width=innerWidth;canvas.height=innerHeight;
  particles=[];
  const colors=['#a855f7','#7c2ae8','#f5c842','#c084fc','#ff80d8','#80b0ff','#f0e0ff'];
  for(let i=0;i<200;i++){
    const angle=(Math.random()*360)*Math.PI/180;
    particles.push({
      x:Math.random()*canvas.width,
      y:-20-Math.random()*200,
      vx:(Math.random()-.5)*5,
      vy:2+Math.random()*5,
      va:(Math.random()-.5)*.18,
      w:5+Math.random()*9,
      h:2+Math.random()*5,
      a:Math.random()*Math.PI*2,
      color:colors[Math.floor(Math.random()*colors.length)],
      opacity:1,
      shape:Math.random()>.6?'circle':'rect'
    });
  }
  running=true;
  step();
}

function step(){
  if(!running){ctx.clearRect(0,0,canvas.width,canvas.height);return;}
  ctx.clearRect(0,0,canvas.width,canvas.height);
  let alive=false;
  particles.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.a+=p.va;p.vy+=.06;
    if(p.y>canvas.height*.75)p.opacity-=.02;
    if(p.opacity>0){
      alive=true;
      ctx.save();
      ctx.globalAlpha=Math.max(0,p.opacity);
      ctx.translate(p.x,p.y);ctx.rotate(p.a);
      ctx.fillStyle=p.color;
      if(p.shape==='circle'){
        ctx.beginPath();ctx.arc(0,0,p.w/2,0,Math.PI*2);ctx.fill();
      } else {
        ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      }
      ctx.restore();
    }
  });
  if(alive)cRaf=requestAnimationFrame(step);
  else ctx.clearRect(0,0,canvas.width,canvas.height);
}

function stopConfetti(){
  running=false;cancelAnimationFrame(cRaf);
  ctx.clearRect(0,0,canvas.width,canvas.height);
}

window.addEventListener('resize',()=>{
  if(running){canvas.width=innerWidth;canvas.height=innerHeight;}
});

})();
</script>
